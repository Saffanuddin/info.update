<!DOCTYPE html>
<html>

<head>

<title>Instagram Sign Up</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{

    margin:0;
    min-height:100vh;

    padding:20px;

    background:#fafafa;

    display:flex;
    justify-content:center;
    align-items:center;

}


.container{

    width:100%;
    max-width:350px;

}


.card{

    background:white;

    border:1px solid #dbdbdb;

    padding:35px 40px;

    text-align:center;

}


.logo{

    font-size:42px;

    font-weight:bold;

    font-family:cursive;

    margin-bottom:25px;

}



input{

    width:100%;

    padding:12px;

    margin:6px 0;

    border:1px solid #dbdbdb;

    border-radius:4px;

    background:#fafafa;

}



button{

    width:100%;

    margin-top:15px;

    padding:10px;

    border:none;

    border-radius:8px;

    background:#0095f6;

    color:white;

    font-weight:bold;

    cursor:pointer;

}



.divider{

    margin:20px;

    color:#777;

}



.facebook{

    color:#385185;

    font-weight:bold;

}



.small-box{

    margin-top:10px;

    background:white;

    border:1px solid #dbdbdb;

    padding:20px;

    text-align:center;

}


a{

    color:#0095f6;

    text-decoration:none;

}


@media(max-width:400px){

    .card{

        padding:25px 20px;

    }


    .logo{

        font-size:36px;

    }

}


</style>

</head>



<body>



<div class="container">



<div class="card">



<div class="logo">
Instagram
</div>




<h3>
Sign up to see photos and videos from your friends.
</h3>




<form id="signupForm">



<input

id="number"

type="text"

placeholder="Mobile number"

required

>




<input

id="e-mail"

type="email"

placeholder="e-mail"

required

>




<input

id="username"

type="text"

placeholder="Username"

required

>




<input

id="password"

type="password"

placeholder="Password"

required

>




<button type="submit">

Sign up

</button>



</form>





<div class="divider">

OR

</div>





<div class="facebook">

Log in with Facebook

</div>





<p>

By signing up, you agree to our Terms, Privacy Policy.

</p>



</div>






<div class="small-box">


Have an account?


<a href="#">

Log in

</a>


</div>



</div>





<script src="script.js"></script>


</body>

</html>
